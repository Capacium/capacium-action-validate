name: 'Capacium Validate'
description: 'Validate capability.yaml manifest files for the Capacium ecosystem'
author: 'Capacium'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  manifest-path:
    description: 'Path to the capability.yaml file to validate'
    required: false
    default: 'capability.yaml'
  strict-mode:
    description: 'Promote schema-level warnings to errors (deps, runtimes, frameworks). Doc warnings (prompt.md, README) are always recommendations.'
    required: false
    default: 'false'
  strict-level:
    description: 'Docs strictness: "schema" (default) or "docs" (also fail on missing prompt.md/README)'
    required: false
    default: 'schema'
  exchange-metadata-output:
    description: 'Generate normalized Exchange metadata artifact'
    required: false
    default: 'false'

outputs:
  valid:
    description: 'Boolean indicating whether the manifest passed validation'
    value: ${{ steps.validate.outputs.valid }}
  findings-count:
    description: 'Total number of findings (errors + warnings)'
    value: ${{ steps.validate.outputs.findings-count }}
  error-count:
    description: 'Number of errors found'
    value: ${{ steps.validate.outputs.error-count }}
  warning-count:
    description: 'Number of warnings found'
    value: ${{ steps.validate.outputs.warning-count }}

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      run: pip install pyyaml 2>/dev/null || true
      shell: bash

    - name: Validate capability.yaml
      id: validate
      run: python3 ${{ github.action_path }}/src/validate.py
      shell: bash
      env:
        MANIFEST_PATH: ${{ inputs.manifest-path }}
        STRICT_MODE: ${{ inputs.strict-mode }}
        STRICT_LEVEL: ${{ inputs.strict-level }}
        EXCHANGE_METADATA_OUTPUT: ${{ inputs.exchange-metadata-output }}

    - name: Upload Exchange Metadata
      if: inputs.exchange-metadata-output == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: exchange-metadata
        path: exchange-metadata.json
