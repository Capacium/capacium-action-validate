name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-self:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate own capability.yaml
        uses: ./
        id: validate
        with:
          manifest-path: capability.yaml
          strict-mode: 'true'
          exchange-metadata-output: 'true'

      - name: Verify validation passed
        if: steps.validate.outputs.valid != 'true'
        run: |
          echo "Self-validation failed!"
          echo "Errors: ${{ steps.validate.outputs.error-count }}"
          echo "Warnings: ${{ steps.validate.outputs.warning-count }}"
          exit 1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python3 src/validate.py
        env:
          MANIFEST_PATH: capability.yaml
          STRICT_MODE: "true"
